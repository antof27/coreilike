version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-core-app
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file: 
      - .env
    environment:
      
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      
      - DB_TYPE=sqlite
      
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      
      # Timezone
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - TZ=${TZ:-UTC}
      
      # Execution settings - keep logs for 7 days
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      
      # Enable task runners for better performance
      - N8N_RUNNERS_ENABLED=true
      
      # User folder for persistence
      - N8N_USER_FOLDER=/home/node/.n8n
      
    volumes:
      # CRITICAL: Persistent storage for workflows & credentials
      - n8n_data:/home/node/.n8n
      # Local files storage
      - n8n_files:/files
      
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  n8n_data:
    driver: local
  n8n_files:
    driver: local